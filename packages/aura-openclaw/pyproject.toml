[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "aura-openclaw"
version = "0.1.0"
description = "Python-native OpenClaw-compatible gateway, channels, and skills for A.U.R.A."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
  "websockets>=12.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["aura_openclaw*"]
