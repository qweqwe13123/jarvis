name: Build desktop releases

on:
  workflow_dispatch:
  # Tag pushes must not auto-upload — they overwrite locally notarized assets.
  # Use workflow_dispatch, or packaging/deploy_release.sh for production.
  # push:
  #   tags:
  #     - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            key: darwin-arm64
          # macos-13 retired Dec 2025; use last hosted Intel runner.
          - os: macos-15-intel
            key: darwin-x64
          - os: windows-latest
            key: win-x64
          - os: ubuntu-22.04
            key: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libfuse2 desktop-file-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt
          pip install -r packaging/requirements-packaging.txt
          python -m playwright install chromium || true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V=$(python3 packaging/print_version.py)
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Ensure Windows .ico + Inno Setup
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [[ ! -f assets/AURA.ico ]]; then
            python packaging/make_windows_ico.py
          fi
          choco install innosetup -y --no-progress
          echo "ISCC=C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe" >> "$GITHUB_ENV"

      - name: Build release artifacts
        env:
          AURA_UPDATE_MANIFEST_URL: https://www.hiauraai.com/api/releases/latest
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          python packaging/build.py \
            --version "$V" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/v${V}"

      - name: Ensure update blockmaps
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/releases/AURA-*.zip dist/releases/AURA-*.AppImage; do
            [[ -f "$f" ]] || continue
            [[ -f "${f}.blockmap" ]] && continue
            python packaging/make_blockmap.py "$f" -o "${f}.blockmap"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aura-${{ matrix.key }}
          path: |
            dist/releases/AURA-*
            dist/releases/manifest.json
          if-no-files-found: error

  merge-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge manifests and collect files
        env:
          RELEASE_REF: ${{ github.ref_name }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import json, os, shutil
          from pathlib import Path

          out = Path("dist/releases")
          out.mkdir(parents=True, exist_ok=True)
          tag = os.environ.get("RELEASE_REF") or "v0.0.0"
          ver = tag[1:] if tag.startswith("v") else tag
          repo = os.environ.get("RELEASE_REPO") or "qweqwe13123/jarvis"
          merged = {
              "version": ver,
              "released_at": "",
              "notes": f"## A.U.R.A {ver}\n\n- Desktop builds for macOS, Windows, Linux",
              "releases_base_url": f"https://github.com/{repo}/releases/download/v{ver}",
              "platforms": {},
          }
          for art in Path("artifacts").iterdir():
              if not art.is_dir():
                  continue
              for f in art.rglob("*"):
                  if f.is_file() and f.name.startswith("AURA-"):
                      shutil.copy2(f, out / f.name)
                  if f.name == "manifest.json":
                      data = json.loads(f.read_text(encoding="utf-8"))
                      merged["version"] = data.get("version", merged["version"])
                      merged["released_at"] = data.get("released_at") or merged["released_at"]
                      merged["notes"] = data.get("notes") or merged["notes"]
                      platforms = data.get("platforms") or {}
                      merged["platforms"].update(platforms)
          (out / "manifest.json").write_text(json.dumps(merged, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(merged, indent=2))
          PY

      - name: Upload merged release folder
        uses: actions/upload-artifact@v4
        with:
          name: aura-all-platforms
          path: dist/releases/

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/releases/AURA-* \
            --title "A.U.R.A ${GITHUB_REF_NAME}" \
            --notes-file dist/releases/manifest.json \
            --clobber || \
          gh release upload "${GITHUB_REF_NAME}" dist/releases/AURA-* --clobber
