name: Release macOS (signed + notarized DMG)

# Production pipeline — Chrome / Cursor style:
#   tag vX.Y.Z → build .app → premium DMG → codesign → notarize → GitHub Release
#
# Required repository secrets:
#   MACOS_CERTIFICATE_P12_BASE64
#   MACOS_CERTIFICATE_PASSWORD
#   APPLE_API_KEY_BASE64          # AuthKey_XXXXXX.p8 base64
#   APPLE_API_KEY_ID
#   APPLE_API_ISSUER
# Optional:
#   AURA_CODESIGN_IDENTITY       # default: Developer ID Application: Khalil Isaiev (PNY6NC68X3)

on:
  workflow_dispatch:
    inputs:
      notarize:
        description: "Notarize with Apple (requires secrets)"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  AURA_NOTARY_PROFILE: AURA-notarize

jobs:
  macos-arm64:
    name: macOS Apple Silicon (signed DMG)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V=$(python3 packaging/print_version.py)
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Resolve codesign identity
        run: |
          ID='${{ secrets.AURA_CODESIGN_IDENTITY }}'
          if [[ -z "$ID" ]]; then
            ID='Developer ID Application: Khalil Isaiev (PNY6NC68X3)'
          fi
          echo "AURA_CODESIGN_IDENTITY=$ID" >> "$GITHUB_ENV"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt
          pip install -r packaging/requirements-packaging.txt
          python -m playwright install chromium || true

      - name: Generate Retina DMG artwork
        run: python packaging/dmg_background.py

      - name: Import signing + notary credentials
        if: ${{ github.event_name == 'push' || inputs.notarize }}
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          chmod +x packaging/ci_import_signing.sh
          packaging/ci_import_signing.sh

      - name: Build, sign, notarize premium DMG
        env:
          AURA_CODESIGN_IDENTITY: ${{ env.AURA_CODESIGN_IDENTITY }}
          AURA_NOTARY_PROFILE: ${{ env.AURA_NOTARY_PROFILE }}
        run: |
          EXTRA=(--sign)
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.notarize }}" == "true" ]]; then
            EXTRA=(--notarize)
          fi
          python packaging/build.py \
            --version "${{ steps.ver.outputs.version }}" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.version }}" \
            --notes "## A.U.R.A ${{ steps.ver.outputs.version }}

          - Signed + notarized macOS Apple Silicon (.dmg)
          - Premium drag-to-Applications installer
          - Double-clap wake (AURA Wake)" \
            "${EXTRA[@]}"

      - name: Verify Gatekeeper acceptance
        if: ${{ github.event_name == 'push' || inputs.notarize }}
        run: |
          DMG="dist/releases/AURA-${{ steps.ver.outputs.version }}-macos-arm64.dmg"
          spctl -a -t open --context context:primary-signature -v "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-macos-arm64-dmg
          path: |
            dist/releases/AURA-*-macos-arm64.dmg
            dist/releases/AURA-*-macos-arm64.zip
            dist/releases/manifest.json
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          V="${{ steps.ver.outputs.version }}"
          NOTES=$(python3 -c 'import json;from pathlib import Path;m=json.loads(Path("dist/releases/manifest.json").read_text());print(m.get("notes") or ("AURA "+str(m.get("version"))))')
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "dist/releases/AURA-${V}-macos-arm64.dmg" \
              "dist/releases/AURA-${V}-macos-arm64.zip" \
              dist/releases/manifest.json \
              --clobber
          else
            gh release create "$TAG" \
              "dist/releases/AURA-${V}-macos-arm64.dmg" \
              "dist/releases/AURA-${V}-macos-arm64.zip" \
              dist/releases/manifest.json \
              --title "AURA ${V}" \
              --notes "$NOTES"
          fi

  # Unsigned matrix retained for Windows/Linux + Intel mac (optional).
  other-platforms:
    name: ${{ matrix.key }}
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            key: darwin-x64
          - os: windows-latest
            key: win-x64
          - os: ubuntu-22.04
            key: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt
          pip install -r packaging/requirements-packaging.txt
      - name: Build
        run: |
          V="${GITHUB_REF_NAME#v}"
          python packaging/build.py \
            --version "$V" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: aura-${{ matrix.key }}
          path: dist/releases/AURA-*
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/releases/AURA-* --clobber
