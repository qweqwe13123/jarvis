name: Release Windows + Linux

# Build Win/Linux update packages with Cursor-style ZIP + blockmap parity to macOS.
# Does NOT touch notarized macOS assets on the GitHub release.
#
# Usage:
#   gh workflow run release-win-linux.yml -f tag=v1.0.20
# Then run packaging/deploy_release.sh locally to sync the site manifest.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.20). Empty = VERSION from repo."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            key: win-x64
          - os: ubuntu-22.04
            key: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libfuse2 desktop-file-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt
          pip install -r packaging/requirements-packaging.txt
          python -m playwright install chromium || true

      - name: Resolve version / tag
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
            V="${TAG#v}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            V="${TAG#v}"
          else
            V=$(python3 packaging/print_version.py)
            TAG="v${V}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$V tag=$TAG"

      - name: Ensure Windows .ico + Inno Setup
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set +e
          if [[ ! -f assets/AURA.ico ]]; then
            python packaging/make_windows_ico.py
          fi
          ls -la assets/AURA.ico
          choco install innosetup -y --no-progress || true
          ISCC_PATH=""
          for candidate in \
            "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" \
            "/c/Program Files/Inno Setup 6/ISCC.exe" \
            "/c/ProgramData/chocolatey/bin/ISCC.exe"
          do
            if [[ -f "$candidate" ]]; then
              ISCC_PATH="$candidate"
              break
            fi
          done
          if [[ -z "$ISCC_PATH" ]]; then
            echo "ISCC.exe not found after Inno Setup install"
            exit 1
          fi
          # Convert Git Bash path → Windows path for the Python builder.
          WIN_ISCC=$(cygpath -w "$ISCC_PATH")
          echo "Found ISCC at $WIN_ISCC"
          echo "ISCC=${WIN_ISCC}" >> "$GITHUB_ENV"
          set -e

      - name: Warm pywinauto / comtypes (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Pre-generate comtypes wrappers so PyInstaller's isolated import
          # is less likely to access-violate on a cold runner image.
          python - <<'PY'
          import sys
          print("python", sys.version)
          try:
              import pywinauto
              import pywinauto.controls
              print("pywinauto ok", getattr(pywinauto, "__version__", "?"))
          except Exception as e:
              print("warm import warning:", e)
          PY

      - name: Build release artifacts
        env:
          AURA_UPDATE_MANIFEST_URL: https://www.hiauraai.com/api/releases/latest
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          python packaging/build.py \
            --version "$V" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${TAG}" \
            --notes "## A.U.R.A ${V}

          - Windows + Linux desktop builds
          - In-app updates via ZIP + blockmap (same path as macOS)
          - Windows app icon + onboarding brand logos bundled"

      - name: Ensure blockmaps exist
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          KEY="${{ matrix.key }}"
          if [[ "$KEY" == "win-x64" ]]; then
            ZIP="dist/releases/AURA-${V}-win-x64.zip"
          else
            ZIP="dist/releases/AURA-${V}-linux-x64.zip"
            AI="dist/releases/AURA-${V}-linux-x64.AppImage"
            if [[ -f "$AI" ]]; then
              python packaging/make_blockmap.py "$AI" -o "${AI}.blockmap"
            fi
          fi
          if [[ -f "$ZIP" ]]; then
            python packaging/make_blockmap.py "$ZIP" -o "${ZIP}.blockmap"
          fi
          ls -lh dist/releases/AURA-* || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aura-${{ matrix.key }}
          path: |
            dist/releases/AURA-*
            dist/releases/manifest.json
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect + attach to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
            V="${TAG#v}"
          else
            V=$(python3 packaging/print_version.py)
            TAG="v${V}"
          fi
          mkdir -p dist/releases
          for art in artifacts/*; do
            [[ -d "$art" ]] || continue
            find "$art" -type f \( -name 'AURA-*' -o -name 'manifest.json' \) -exec cp -f {} dist/releases/ \;
          done
          ls -lh dist/releases/

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "AURA ${V}" --notes "AURA ${V}"
          fi

          # Upload only win/linux packages — never clobber macOS notarized assets.
          shopt -s nullglob
          FILES=(
            dist/releases/AURA-${V}-win-x64.exe
            dist/releases/AURA-${V}-win-x64.zip
            dist/releases/AURA-${V}-win-x64.zip.blockmap
            dist/releases/AURA-${V}-linux-x64.AppImage
            dist/releases/AURA-${V}-linux-x64.AppImage.blockmap
            dist/releases/AURA-${V}-linux-x64.zip
            dist/releases/AURA-${V}-linux-x64.zip.blockmap
          )
          UPLOAD=()
          for f in "${FILES[@]}"; do
            [[ -f "$f" ]] && UPLOAD+=("$f")
          done
          if [[ ${#UPLOAD[@]} -eq 0 ]]; then
            echo "No win/linux assets to upload"
            exit 1
          fi
          gh release upload "$TAG" "${UPLOAD[@]}" --clobber
          echo "Uploaded to $TAG:"
          printf '  %s\n' "${UPLOAD[@]}"
